<title>Siparişiniz Alındı — Kurabiye's</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Mukta:wght@400;600&display=swap" rel="stylesheet">
<style>
  body{font-family:'Mukta',sans-serif;background:#f9f1e3;color:#33201a;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;}
  .box{background:#fff;border-radius:18px;padding:48px 36px;max-width:480px;box-shadow:0 14px 34px rgba(58,15,22,0.18);}
  h1{font-family:'Cormorant Garamond',serif;color:#7d1f2c;margin-bottom:12px;font-size:2.2rem;}
  p{margin-bottom:8px;color:#5d4536;}
  a{display:inline-block;margin-top:20px;background:#d9803f;color:#fff;text-decoration:none;padding:12px 28px;border-radius:999px;font-weight:700;}
</style>
</head>
<body>
  <div class="box">
    <h1>Teşekkürler! 🎉</h1>
    <p>Siparişiniz başarıyla alındı.</p>
    <p>Kurabiyeleriniz özenle hazırlanıp en kısa sürede kargoya verilecektir.</p>
    <a href="/index.html">Ana Sayfaya Dön</a>
  </div>
  <script>
  try{
    var v = parseFloat(localStorage.getItem('kb_last_total')||'0');
    var n = parseInt(localStorage.getItem('kb_last_items')||'1');
    if(window.fbq) fbq('track','Purchase',{value:isNaN(v)?0:v,currency:'TRY',num_items:isNaN(n)?1:n});
    localStorage.removeItem('kb_last_total'); localStorage.removeItem('kb_last_items');
  }catch(e){}
  </script>
</body>
