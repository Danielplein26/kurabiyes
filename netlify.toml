# Netlify yapılandırması – derleme yok, sadece fonksiyonlar
[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

[functions]
  node_bundler = "zisi"

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
